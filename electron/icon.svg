<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- Inner subtle border -->
  <rect x="44" y="44" width="424" height="424" rx="68" fill="none" stroke="rgba(34,197,94,0.06)" stroke-width="1"/>

  <!-- Prompt symbol >_ with glow -->
  <g filter="url(#glow)">
    <!-- > chevron -->
    <path d="M148 164 L148 348" stroke="#22c55e" stroke-width="32" stroke-linecap="round" opacity="0.25"/>
    <path d="M148 164 L284 256 L148 348" fill="none" stroke="#22c55e" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- _ cursor -->
    <rect x="316" y="244" width="8" height="76" rx="4" fill="#38bdf8"/>
  </g>

  <!-- Subtle SH label -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="44" font-weight="500" fill="rgba(100,116,139,0.35)" letter-spacing="10">SH</text>
</svg>
