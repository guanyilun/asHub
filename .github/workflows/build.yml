# Build macOS (ARM64) + Windows (x64) releases
# Triggered on version tags (v*) and manually via workflow_dispatch.
#
# Both platforms build in parallel. After both succeed, a release job
# downloads all artifacts and creates a single GitHub Release — avoiding
# the race condition caused by two parallel "Create Release" steps competing
# for the same tag.
#
# Output:
#   - macOS: .dmg
#   - Windows: .exe (NSIS installer)

name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (macOS ARM64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (Windows x64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --win --x64 --publish never
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: release/

      - name: List release assets
        run: ls -la release/

      - name: Create GitHub Release
        run: |
          set -x
          echo "=== Release assets ==="
          ls -la release/
          echo "=== Creating release for tag: ${{ github.ref_name }} ==="
          gh release create "${{ github.ref_name }}" \
            release/*.dmg \
            release/*.blockmap \
            release/*.exe \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
