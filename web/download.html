<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载 asHub</title>
<meta name="description" content="下载 asHub 桌面客户端 — 支持 macOS 和 Windows。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f8f6;
    --card: #ffffff;
    --text: #141415;
    --text2: #5e5e62;
    --text3: #99999d;
    --accent: #16a34a;
    --accent-hover: #15803d;
    --accent-bg: #f0fdf4;
    --accent-border: #bbf7d0;
    --accent-soft: rgba(22,163,74,.06);
    --border: #ece9e3;
    --border2: #f4f2ed;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.03);
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.04);
    --shadow-hover: 0 2px 4px rgba(0,0,0,.04), 0 12px 32px rgba(0,0,0,.07);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --mono: "DM Mono", "SF Mono", "JetBrains Mono", "Menlo", monospace;
    --sans: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --ease: cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(22,163,74,.04) 0%, transparent 100%),
      radial-gradient(ellipse 60% 50% at 90% 90%, rgba(22,163,74,.03) 0%, transparent 100%);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 680px;
    margin-bottom: 56px;
    animation: fadeDown .5s var(--ease) both;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1a1a1f 0%, #252528 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.1), 0 0 0 1px rgba(34,197,94,.12);
    position: relative;
  }
  .logo::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 9px;
    background: linear-gradient(135deg, rgba(34,197,94,.2), transparent);
    z-index: -1;
    opacity: .6;
  }
  .logo svg { width: 18px; height: 18px; }
  .logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -.3px;
  }
  .version-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    padding: 3px 10px;
    letter-spacing: .3px;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    max-width: 520px;
    margin-bottom: 48px;
    animation: fadeDown .5s var(--ease) .1s both;
  }
  .hero-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1a1a1f 0%, #252528 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(34,197,94,.08);
    position: relative;
  }
  .hero-icon svg { width: 30px; height: 30px; }
  .hero h1 {
    font-family: var(--sans);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -.6px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .hero p {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* ── Download card ── */
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 36px 36px 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: var(--shadow);
    animation: fadeUp .55s var(--ease) .2s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detected-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 18px;
    text-align: center;
  }

  .primary-dl {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: linear-gradient(135deg, #1a1a1f 0%, #222226 100%);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 20px 40px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    width: 100%;
    transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
    box-shadow: 0 2px 16px rgba(0,0,0,.1), 0 0 0 1px rgba(255,255,255,.05);
    position: relative;
    overflow: hidden;
  }
  .primary-dl::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 100px;
    background: linear-gradient(135deg, rgba(34,197,94,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .primary-dl:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,.16), 0 0 0 1px rgba(34,197,94,.15);
  }
  .primary-dl:active { transform: translateY(0); }
  .primary-dl .dl-icon { width: 22px; height: 22px; flex-shrink: 0; opacity: .8; }
  .primary-dl .dl-info { text-align: left; }
  .primary-dl .dl-platform {
    font-size: 11px;
    color: rgba(255,255,255,.45);
    line-height: 1;
    letter-spacing: .4px;
  }
  .primary-dl .dl-label {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -.2px;
  }
  .primary-dl .dl-size {
    font-size: 12px;
    color: rgba(255,255,255,.45);
    font-weight: 400;
    margin-top: 2px;
  }

  /* ── Platform tabs ── */
  .platform-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 22px;
    background: var(--border2);
    border-radius: 100px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .platform-tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 22px;
    background: transparent;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    transition: all .2s var(--ease);
    white-space: nowrap;
  }
  .platform-tab:hover { color: var(--text2); }
  .platform-tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-sm), 0 0 0 1px rgba(0,0,0,.04);
  }
  .platform-tab .plat-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: .45;
    transition: opacity .2s var(--ease);
  }
  .platform-tab.active .plat-icon,
  .platform-tab:hover .plat-icon { opacity: 1; }

  /* ── Alternate formats ── */
  .alt-formats {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .alt-link {
    font-size: 13px;
    color: var(--text2);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color .15s;
  }
  .alt-link:hover { color: var(--accent); }
  .alt-link svg { width: 14px; height: 14px; opacity: .5; }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    line-height: 1.8;
    animation: fadeUp .5s var(--ease) .3s both;
  }
  .footer a { color: var(--text2); text-decoration: none; transition: color .15s; }
  .footer a:hover { color: var(--text); }

  /* ── Pulse dot ── */
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    vertical-align: middle;
    margin-right: 2px;
    animation: pulse 2s ease infinite;
    box-shadow: 0 0 6px rgba(22,163,74,.3);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(.85); }
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    body { padding: 40px 16px; }
    .header { margin-bottom: 36px; }
    .hero { margin-bottom: 32px; }
    .hero h1 { font-size: 26px; }
    .hero p { font-size: 14px; }
    .hero-icon { width: 48px; height: 48px; border-radius: 12px; }
    .hero-icon svg { width: 26px; height: 26px; }
    .main-card { padding: 28px 20px 24px; border-radius: var(--radius); }
    .primary-dl { padding: 18px 28px; font-size: 15px; }
    .primary-dl .dl-label { font-size: 15px; }
    .platform-tab { padding: 8px 16px; font-size: 12px; }
    .alt-formats { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo-wrap">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 8 L17 12 L5 16" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="17" y="9" width="2" height="6" rx="1" fill="#38bdf8"/>
      </svg>
    </div>
    <span class="logo-text">asHub</span>
  </div>
  <span class="version-tag" id="version-display"></span>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-icon">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5 8 L17 12 L5 16" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="17" y="9" width="2" height="6" rx="1" fill="#38bdf8"/>
    </svg>
  </div>
  <h1>下载 asHub</h1>
  <p>属于你的桌面 Agent 助手——轻量、高效、多任务并行。</p>
</section>

<!-- Main download card -->
<main class="main-card">
  <div class="detected-label" id="detected-label">
    <span class="pulse"></span> 已识别你的系统
  </div>
  <a class="primary-dl" id="primary-dl" href="#">
    <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v14"/>
      <polyline points="8 13 12 17 16 13"/>
      <path d="M4 17v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
    </svg>
    <div class="dl-info">
      <div class="dl-platform" id="dl-platform-name"></div>
      <div class="dl-label">下载 <span id="dl-os-name"></span> 版</div>
      <div class="dl-size" id="dl-file-info"></div>
    </div>
  </a>

  <div class="platform-tabs" id="platform-tabs"></div>

  <div class="alt-formats" id="alt-formats"></div>
</main>

<!-- Footer -->
<footer class="footer">
  <p>asHub <a href="https://github.com/firslov/ashub" target="_blank">开源</a> &mdash; MIT 协议。</p>
  <p>遇到问题？去 <a href="https://github.com/firslov/ashub/issues" target="_blank">GitHub Issues</a> 反馈。</p>
</footer>

<script>
// ═══════════════════════════════════════════
//  CONFIG — edit this to match your files
// ═══════════════════════════════════════════
// BASE: where the binary files live (relative to this page, or absolute URL).
// Set to '' for same directory, or 'https://dl.example.com/files/' etc.
var BASE = '';

// VERSION: shown in the header badge
var VERSION = 'v0.12.2';

// FILES: list your binaries here. Only files listed here will appear on the page.
//   os:   'mac' | 'win' | 'linux'
//   arch: 'arm64' | 'x64' | 'x86'
//   ext:  'dmg' | 'exe' | 'AppImage' | 'zip' | 'deb' | 'rpm'
//   size: bytes (or 0 to hide)
var FILES = [
  { name: 'asHub-0.12.2-arm64.dmg',      os: 'mac',   arch: 'arm64', ext: 'dmg',      size: 107541705 },
  { name: 'asHub-Setup-0.12.2.exe',      os: 'win',   arch: 'x64',   ext: 'exe',      size: 91390976  },
];
// ═══════════════════════════════════════════

function urlFor(file) {
  return BASE + file.name;
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
  return (bytes / 1e6).toFixed(0) + ' MB';
}

// ── OS Detection ──
function detectOS() {
  var ua = navigator.userAgent || '';
  var plat = (navigator.platform || '').toLowerCase();
  if (/mac|darwin/i.test(plat) || /mac/i.test(ua)) return 'mac';
  if (/win/i.test(plat) || /win/i.test(ua))   return 'win';
  if (/linux/i.test(plat))                     return 'linux';
  return 'mac';
}

// ── Platform definitions ──
var PLATFORMS = {
  mac: {
    name: 'macOS',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v2a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M8 10h8a4 4 0 0 1 4 4v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-4a4 4 0 0 1 4-4Z"/><line x1="12" y1="10" x2="12" y2="22"/></svg>',
    label: 'macOS',
    arch: 'ARM 架构',
    defaultExt: 'dmg',
  },
  win: {
    name: 'Windows',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="9" height="9" rx="1"/><rect x="13" y="3" width="9" height="9" rx="1"/><rect x="2" y="14" width="9" height="9" rx="1"/><rect x="13" y="14" width="9" height="9" rx="1"/></svg>',
    label: 'Windows',
    arch: '64 位',
    defaultExt: 'exe',
  },
  linux: {
    name: 'Linux',
    icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a5 5 0 0 0-2 9.5V19a2 2 0 0 0 4 0v-6.5A5 5 0 0 0 12 3Z"/></svg>',
    label: 'Linux',
    arch: 'x64',
    defaultExt: 'AppImage',
  },
};

var state = {
  os: detectOS(),
  currentPlatform: detectOS(),
};

function getAsset(os, ext) {
  var assets = FILES.filter(function(f) { return f.os === os && f.ext === ext; });
  if (os === 'mac' && ext === 'dmg') {
    var arm = assets.filter(function(f) { return f.arch === 'arm64'; })[0];
    if (arm) return arm;
  }
  return assets[0] || null;
}

// ── Render ──
function render() {
  var plat = PLATFORMS[state.currentPlatform];
  var defaultExt = plat.defaultExt;
  var primaryAsset = getAsset(state.currentPlatform, defaultExt) || getAsset(state.currentPlatform, 'zip');
  var fileInfo = primaryAsset ? fmtSize(primaryAsset.size) : '';

  // Version tag
  document.getElementById('version-display').textContent = VERSION;

  // Primary button
  document.getElementById('dl-platform-name').textContent =
    state.currentPlatform === 'mac' ? 'ARM 架构' : plat.arch;
  document.getElementById('dl-os-name').textContent = plat.label;
  document.getElementById('dl-file-info').textContent =
    fileInfo ? defaultExt.toUpperCase() + ' · ' + fileInfo : '';
  if (primaryAsset) {
    document.getElementById('primary-dl').href = urlFor(primaryAsset);
  }

  // Detected / selected label
  document.getElementById('detected-label').innerHTML =
    state.currentPlatform === state.os
      ? '<span class="pulse"></span>&nbsp; 已识别你的系统'
      : '已选择系统';

  // Platform tabs
  var tabsEl = document.getElementById('platform-tabs');
  tabsEl.innerHTML = Object.keys(PLATFORMS).map(function(key) {
    var p = PLATFORMS[key];
    var isActive = key === state.currentPlatform;
    // Only show platforms that have files
    var hasFiles = FILES.some(function(f) { return f.os === key; });
    if (!hasFiles) return '';
    return '<button class="platform-tab' + (isActive ? ' active' : '') + '" data-os="' + key + '">' +
      '<span class="plat-icon">' + p.icon + '</span>' +
      p.label +
      '<span class="plat-arch">· ' + p.arch + '</span>' +
    '</button>';
  }).join('');

  // Alternate formats
  var altEl = document.getElementById('alt-formats');
  var altFormats = FILES
    .filter(function(f) {
      return f.os === state.currentPlatform
        && f.ext !== defaultExt
        && f.name.indexOf('blockmap') === -1
        && f.name.indexOf('.yml') === -1;
    })
    .map(function(f) {
      return '<a class="alt-link" href="' + urlFor(f) + '">' +
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 13h10M8 3v8"/><polyline points="5 8 8 11 11 8"/></svg>' +
        f.ext.toUpperCase() + ' 压缩包 · ' + fmtSize(f.size) +
      '</a>';
    });
  altEl.innerHTML = altFormats.length ? altFormats.join('') : '';
  altEl.style.display = altFormats.length ? '' : 'none';
}

// ── Events ──
document.addEventListener('DOMContentLoaded', function() {
  // Check if detected platform actually has files; fall back to first available
  var available = ['mac', 'win', 'linux'].filter(function(os) {
    return FILES.some(function(f) { return f.os === os; });
  });
  if (available.indexOf(state.currentPlatform) === -1) {
    state.currentPlatform = available[0] || 'mac';
  }

  render();

  document.getElementById('platform-tabs').addEventListener('click', function(e) {
    var btn = e.target.closest('.platform-tab');
    if (!btn) return;
    state.currentPlatform = btn.dataset.os;
    render();
  });
});
</script>
</body>
</html>
