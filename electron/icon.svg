<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background with padding for Dock safe zone -->
  <rect x="64" y="64" width="384" height="384" rx="72" fill="url(#bg)"/>
  <rect x="64" y="64" width="384" height="384" rx="72" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- Inner subtle border -->
  <rect x="80" y="80" width="352" height="352" rx="58" fill="none" stroke="rgba(34,197,94,0.08)" stroke-width="1"/>

  <!-- Prompt symbol >_ with glow -->
  <g filter="url(#glow)">
    <!-- > chevron -->
    <path d="M156 172 L156 340" stroke="#22c55e" stroke-width="28" stroke-linecap="round" opacity="0.3"/>
    <path d="M156 172 L268 256 L156 340" fill="none" stroke="#22c55e" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- _ cursor -->
    <rect x="296" y="246" width="8" height="64" rx="4" fill="#38bdf8"/>
  </g>

  <!-- Subtle SH label -->
  <text x="256" y="390" text-anchor="middle" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="36" font-weight="500" fill="rgba(100,116,139,0.4)" letter-spacing="8">SH</text>
</svg>
