# Build macOS (ARM64) + Windows (x64) releases
# Triggered on version tags (v*) and manually via workflow_dispatch.
#
# Both platforms build in parallel. After both succeed, a release job
# downloads all artifacts and creates a single GitHub Release — avoiding
# the race condition caused by two parallel "Create Release" steps competing
# for the same tag.
#
# Output:
#   - macOS: .dmg
#   - Windows: .exe (NSIS installer)

name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (macOS ARM64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (Windows x64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --win --x64 --publish never
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: release/

      - name: List release assets
        run: ls -la release/

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          TOKEN="${{ github.token }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          # ── helpers ──────────────────────────────────────────────
          api_call() {
            # usage: api_call <method> <path> [data]
            local method="$1" path="$2" data="${3:-}"
            local extra_args=()
            [ -n "$data" ] && extra_args=(-d "$data")
            curl -s -w "\n%{http_code}" \
              -X "$method" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${extra_args[@]}" \
              "https://api.github.com/repos/$REPO/$path"
          }

          retry_with_backoff() {
            local max_attempts=5 delay=10 attempt=1
            local resp http_code body
            while [ $attempt -le $max_attempts ]; do
              resp=$(api_call "$1" "$2" "$3")
              http_code=$(echo "$resp" | tail -1)
              body=$(echo "$resp" | sed '$d')
              if [ "$http_code" = "201" ] || [ "$http_code" = "200" ] || [ "$http_code" = "204" ]; then
                echo "$body"
                return 0
              fi
              if [ "$http_code" = "403" ] && echo "$body" | grep -q "rate limit"; then
                echo "Rate limited (attempt $attempt/$max_attempts). Waiting ${delay}s…"
                sleep "$delay"
                delay=$((delay * 2))
                attempt=$((attempt + 1))
              else
                echo "Create release: HTTP $http_code" >&2
                echo "Error response: $body" >&2
                return 1
              fi
            done
            echo "Still rate limited after $max_attempts attempts" >&2
            return 1
          }

          # ── check rate limit (from headers, no extra API call) ────
          echo "=== Rate limit status ==="
          curl -sI -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/$REPO" 2>/dev/null | \
            grep -i '^x-ratelimit-' || true

          echo "=== Release assets ==="
          ls -la release/

          echo "=== Creating release for tag: $TAG ==="
          BODY=$(retry_with_backoff POST "releases" \
            "{\"tag_name\":\"$TAG\",\"generate_release_notes\":true}") || exit 1

          # Get the upload URL
          UPLOAD_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")

          # Upload each asset (with retry + backoff)
          for f in release/*.dmg release/*.exe release/*.blockmap release/latest-mac.yml release/latest.yml; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            enc_name=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$name")
            echo "Uploading: $name"
            uploaded=0
            delay=10
            for attempt in $(seq 1 5); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/octet-stream" \
                "$UPLOAD_URL?name=$enc_name" \
                --data-binary "@$f")
              if [ "$HTTP_CODE" = "201" ]; then
                echo "  ✓ $name"
                uploaded=1
                break
              elif [ "$HTTP_CODE" = "403" ]; then
                echo "  Rate limited uploading $name (attempt $attempt/5), waiting ${delay}s…"
                sleep "$delay"
                delay=$((delay * 2))
              else
                echo "  ✗ $name (HTTP $HTTP_CODE)"
                break
              fi
            done
            [ "$uploaded" = "1" ] || { echo "  ✗ Failed to upload $name"; exit 1; }
          done

          echo "=== Release created successfully ==="
