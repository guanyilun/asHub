# Build macOS (Apple Silicon) release
# Triggered on pushes to main and manually via workflow_dispatch.
#
# Output: .dmg and .zip artifacts built on an ARM macOS runner,
# published as a GitHub release on tag pushes.

name: Build macOS (ARM64)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        # --ignore-scripts skips postinstall (electron-builder install-app-deps)
        # which fails on node-pty native rebuild due to missing distutils.
        # npmRebuild:false in electron-builder.yml prevents rebuild at pack time.
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (macOS ARM64)
        run: npx electron-builder --mac --arm64
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

      - name: Create GitHub Release (tagged only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          generate_release_notes: true
