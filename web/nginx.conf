# asHub 下载站 — Nginx 配置
# 部署路径：/var/www/ashub/

server {
    listen 80;
    server_name ashub.aihao.world;

    # 用于 certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/ashub;
    }

    # 其他请求全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ashub.aihao.world;

    root /var/www/ashub;
    index download.html;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/ashub.aihao.world/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashub.aihao.world/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # ── 安全头 ──
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Gzip ──
    gzip on;
    gzip_types text/html text/css application/javascript text/plain;
    gzip_min_length 512;

    # ── 日志 ──
    access_log /var/log/nginx/ashub.access.log;
    error_log  /var/log/nginx/ashub.error.log;

    # ── 静态文件 ──
    # 大文件下载（dmg/exe/zip）关闭缓冲，允许断点续传
    location ~* \.(dmg|exe|zip|AppImage)$ {
        add_header Cache-Control "public, max-age=86400";
        proxy_buffering off;
        # 允许大文件
        client_max_body_size 0;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
